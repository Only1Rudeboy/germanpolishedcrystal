# Continuous Integration Workflow (germanpolishedcrystal fork)
name: "CI Build"

on:
  pull_request:
    branches:
      - master
  workflow_call:

env:
  # PC_VERSION should match VERSION in Makefile
  PC_VERSION: "3.2.3"
  # Pin to version that matches successful DE builds (pre-055 CI green)
  RGBDS_VERSION: "v1.0.1"

jobs:
  build-ubuntu:
    name: "Build"
    runs-on: ubuntu-latest
    steps:
      - id: set-env-var
        name: "Set environment variables"
        run: |
          echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_ENV

      - id: apt-get-depends
        name: "Install build dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install bison gcc git make libpng-dev pkg-config -y

      - id: checkout-rgbds
        name: "Checkout gbdev/rgbds"
        uses: actions/checkout@v4
        with:
          path: rgbds
          ref: ${{ env.RGBDS_VERSION }}
          repository: gbdev/rgbds

      - id: install-rgbds
        name: "Install gbdev/rgbds"
        working-directory: rgbds
        run: |
          sudo make install
          rgbasm -V

      - id: checkout-polishedcrystal
        name: "Checkout germanpolishedcrystal"
        uses: actions/checkout@v4

      - id: build-tools
        name: "Build tools"
        run: |
          make -C tools clean
          make -C tools -j$(nproc)

      - id: build-polishedcrystal
        name: "Build polishedcrystal"
        run: |
          set -o pipefail
          make -j$(nproc) crystal 2>&1 | tee build-crystal.log
          test -f polishedcrystal-${{ env.PC_VERSION }}.gbc
          mkdir -p build
          mv polishedcrystal-${{ env.PC_VERSION }}.gbc build/polishedcrystal-dev-${{ env.SHORT_SHA }}.gbc
          mv polishedcrystal-${{ env.PC_VERSION }}.sym build/polishedcrystal-dev-${{ env.SHORT_SHA }}.sym || true

      - id: upload-build-log
        if: failure()
        name: "Upload build log on failure"
        uses: actions/upload-artifact@v4
        with:
          name: build-crystal-log
          path: build-crystal.log
          retention-days: 7

      - id: upload-polishedcrystal
        if: success()
        name: "Upload polishedcrystal artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: "polishedcrystal"
          retention-days: 3
          path: |
            build/polishedcrystal-dev-${{ env.SHORT_SHA }}.*
